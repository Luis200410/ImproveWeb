<!DOCTYPE html>
<html>

<head>
    <title>Logo Trace Debugger</title>
    <style>
        body {
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            position: relative;
            width: 900px;
            height: 900px;
            border: 1px solid #333;
            margin-top: 20px;
        }

        .source {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.5;
        }

        .trace {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .controls {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>Logo Trace Debugger</h1>
    <div class="container">
        <!-- The Source Logo (resized to fits) -->
        <img src="logo SVG.svg" class="source" id="sourceImg">

        <!-- The Current Path (scaled to fit) -->
        <svg viewBox="0 0 500 340" class="trace">
            <path
                d="M 34 105 C 110 100 195 82 249 64 C 258 52 262 36 255 27 C 249 20 242 26 238 42 C 234 58 236 72 248 82 C 244 94 222 118 195 148 C 168 178 138 208 114 238 C 94 258 75 270 63 286 C 52 296 48 304 55 304 C 62 304 72 294 82 280 C 92 266 100 250 97 238 C 94 226 86 228 90 240 C 96 252 138 242 243 195 C 340 152 430 94 496 20"
                stroke="#FF0000" stroke-width="2" fill="none" />
        </svg>
    </div>
    <div class="controls">
        <p>Current Path: <span id="pathStr">M 34 105 ...</span></p>
    </div>
</body>

</html>
